services:
  - type: web
    name: product-pagination-service
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.2
      - key: DATABASE_URL
        sync: false # Set manually in Render dashboard to point to Neon PostgreSQL
